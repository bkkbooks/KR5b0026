  text: 二經同卷字六
  hash: sha256:c903d1a2ddb5470d503364eb115708a7cf6f800814ffe9dd219fbd652826ec84
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5b0026_HFL_000-001a, image: hfl/0176/0176-126.png}
body:
  text: 太上洞玄靈寶太玄普慈勸世經太上洞玄靈寶四方大願經太上洞玄靈寶太玄普慈勸世經爾時尋聲救苦無上天尊為衆生故權應現身於雜報世界染欲愛天與諸真仙同與眷屬詣真多舍坐以金牀而我等比得蒙親近曽不用心恭敬圍繞此時衆內有一真人名普慈就地長跪稽首禮足上白天尊凡修功德何者為最免離諸苦何者為先是時天尊答普慈言善男子等汝可諦聽譬如有人莊嚴寶相不離衆色亦如世人莊嚴一身不離衣服冠巾靴帶光飾目前人所愛悅汝今所問亦復如是不離五戒十善之業莊嚴善因為後世緣汝應思惟世間衆生唯知莊嚴世間之法不知莊嚴未來之法何以故戀著世間不能捨故我觀衆生戀著世法如濁溷蛆多諸糞穢將為快樂不願出生人中受樂衆生亦爾耽著五欲自以為樂不願生天受天堂樂善男子諸天處樂視於人間即如世人觀穢溷蛆共處不淨何以故膿囊涕唾大小便利是身不淨是身不淨者是義云何如世間人飲食酒肉從身外八便將為淨及至身內大小便利如此等事以為不淨世人唯知酒肉為淨諸天觀之非為淨也是故衆生耽著酒肉及五欲樂明知不淨所以我言如穢溷蛆善男子我觀世人罪多福少貧多冨少如是種義皆由不能莊嚴福業汝今殷勤為勸世緣爾時普慈心生歡喜飢不望餐願聞斯義流布世間天尊告善慈真人言汝今當知若復有人安心不動遊入定門生精思室不貪香咪及以色聲如是因緣得不動果生不動國將來男女欲求不動之果報者應須入定端坐觀心於諸法門甚為第一善男子若人懈怠聞有道埸説法施戒乘間髙枕不肯受持夏取風涼冬求溫暖歌詠吟嘯悅樂一生恣口肥鮮縱心邪蕩填塞善路開通惡門如是等人無一善果善男子若人於世無他事故亦無私惱不著色聲香味觸法常運其心觀聽大乘受戒懴悔如是等人勝於前人百千萬倍功德果報善男子若人受法撥除他事權停雜技於逼迫中於憂樂中於富貴中於貧寒中並能捨離觀聽妙經受戒懴悔復勝前人百千萬倍功德果報善男子若復有人耳聾目盲手腳不遂諸處無寧親近道場傍求妙善如是等人得功德力將來果報復其身形無諸疾惱若人慈心常將衣食施與此人未來生中功德果報多於今生百千萬倍况能布施三寶尊經説法道場寫經造像功德果報不可稱量復次普慈應作是念若復有人不曽一時腳踐淨地如是凡夫謂之無足不曽一時執持經卷如是等人謂之無手若人遊入道場眼見天尊并諸經典心不歸依謂之無目若人聞説諸經句偈心不記憶謂之無耳何以故腳手眼耳不生功德以無功德故未來生中不受果報雖生中國或墮邊夷決定不全腳手眼耳善男子世間衆生罪多福少云何不經十八地獄時普慈真人聞斯説巳不覺流涕稽首天尊以偈白言九幽考對無間日晝夜常聞受苦聲皆由前身不念善死後相牽入鐡城牛頭本自無情者獄卒何能有慈仁鐡丸炎炎充飢餒鐡鳥飛來啄眼晴冤家債主無頭數一一酬還業報明願將此偈流布世間唯願天人聞斯演説成就福田天尊爾時再告普慈曰衆生愚暗如人夜行之於前途恣其足力踐大毒蛇傷害身形痛苦交切不經旬日便致夭傷人亦如是心性剛強恣情造罪不滿百年乃墮地獄手攀劒樹足履刀山碓搗磑磨屑屑如粉遙觀此輩傷切我心我今助汝以偈曰生時不肯親三寶死後何能免九幽一墮無明長夜獄千年不悟死生由鐡牀晝夜常如火劒樹枝條不識秋啼哭衆生并餓鬼怨憎獄卒與牛頭刀山巖巖傷手足爐炭炎炎慘酷人萬八千劫無歸日縱出還生豬狗身為人不肯行方便作鬼何緣有善因此是三塗八難處憂悲苦惱向誰陳爾時天尊説此偈巳復告普慈然諸衆生居此世界作地獄本心常逼迫煩惱自纒疾病侵身寒溫痛癢飢窮凍餓諸不稱心終劫説之亦不能盡是故當知凡夫衆生於諸世間不得自在若復有人衣食豐足饒諸牛馬多有資財奴婢僮僕如此凡夫亦不自在以不自在故多嗔恚生多妄想生多殺害生多嗊嗃生以是因緣必墮地獄無有出期復告普慈有凡夫身有無嗔恚者不普慈答曰不也無身則無有身則有天尊又言普慈真人如法所説若無嗔恚及以殺生如是等法則非凡夫有嗔恚故凡夫自生以是因緣嗔恚凡夫凡夫嗔恚何以故嗔恚若盡凡夫亦盡嗔恚未盡凡夫未盡如此嗔恚從凡夫生如此地獄從嗔患起以是因緣凡夫地獄地獄凡夫何以故凡夫苦盡地獄即盡凡夫未盡地獄未盡當息嗔恚即無凡夫以無凡夫即無地獄復次普慈為勸世緣應語衆生世因不定皆須及時時來物新時去物衰是名不定是不定人云何不定如人初生名嬰孩時須臾匍匐漸次小年少年長年壯年中年老年如是之年衰老不定又如病時煩惱時憂愁時苦痛時死亡時如是之時無常不定若人居世從生至死造作諸惡不可格量死入三塗毒痛憂苦牛頭怒眼心膽俱摧叩頭向天無救無護又循劔樹入於鑊湯寒冰冶庭鐵牀銅柱備諸苦楚無復人形如是之時受苦不定是故我説皆須及時栽種福田云何名為及時因緣如人菜食應須及少比至老年時過食難長齋讀經燒香禮拜常近道場聽法懴悔施食及財如是等例皆須及時時過無堪如寒月桑善男子應作是念如世間人不能蔬食焉能長齋不能長齋焉能斷穀不能斷穀焉能學仙不能學仙焉能學道不能學道焉能得道不能得道焉能離苦以是因緣持齋斷穀求仙學道如此等人應須供養何以故是學道人名為及時是供養人亦名及時如人種穀春種秋望名為及時不種無望名為失時凡一切惡以智慧斷但一切善以智慧修為後世緣名為及時後世無緣名為失時又如今世富樂長壽名為及時貧窮夭逝皆為失時我觀世人得時者少失時者多復次普慈曰若人慈心捨家資財及身上衣施與道士寫經造像共立善根如是等人所得功德不可格量當來必應坐蓮花座衣食豐足親近我身何以故施財寫經是發一切衆生耳目是建衆生諸大法橋當知此人獲大果報是故男女欲求長年及未來果應須捨財與清淨道士修寫藏經亦名及時若無此心名為失時善男子若人慈心能為二親及親亡歿報生長恩於説法處解身上衣為父母施如是等人今生在世為諸男女生慈孝心何以故作父不孝子必無情如荆棘林多諸惡木以是義故當知此人解身上衣為父母施所生男女如栴檀園多諸香木必不應如荆棘毒林如是之人亦名及時善男子若復有人五逆不孝給養妻子不敬二親嗜酒猖狂歐打罵詈如是等人其罪多於十八地獄受苦衆生所犯之罪十八地獄如其空竭此人之罪方可得除十八地獄如其未盡此人受罪亦復未盡如此衆生名為失時善男子若人慈慈見他布施生歡喜心生勇猛心生精進心求諸因果解身上衣為父母施所得功德多於前人一倍之善如是等人名為及時若無慈悲見他布施生嫉妬心生嗤笑心無歡喜心如是等人無一果報便大得罪死入三塗身充餓鬼報其前身妬他作善亦名失時善男子求地仙者修地仙因求飛仙者修飛仙因求自在者修自在因求無漏者修無漏因求無為者修無為因昔我曽於寶聚國中為海空智藏説此因緣海空聞巳速得無為亦名及時若不作此心名為失時設有一人於説法處多諸睡寐心自念言每常抑責我生何緣坐道場時多諸睡寐我今坐此無益善功此人於中便生退惰我歡凡境人及非人諸五藏中一一肢節皆有真神並能為人受持妙法未來生世必致聰明汝等男女應作是知寧於道場睡寐端坐猶勝歸家間自遊戲名為及時是退情者名為失時諸善男子復作是念若有世人能為亡者齎持財鏹及諸名珍於説法處啓白法衆施與三寶願為亡者懴悔罪愆如是等人心所為處若父若母亡殁六親必得解脫何以故懴悔施財名為贖罪財多福重財少福輕亦隨前人貧富而巳能生此意名為及時若無此心不名及時若復有人善解妙法為他人説令衆受持此人功德盡虛空際難可格量若復有人聽説妙法復能稱揚經中句偈無忘善説傳授於人是名見法是名行法此人功德與説法師等無有異若腹有人聽説妙法三四五句後能共人同來道場懴悔滅罪修種福田如是等人為善知識為法橋粱於後命終不入地獄吾令救苦應世真人迎將此人徑升淨土如是等例名為及時不生此心不名及時若腹有人齋持珠玉金銀等寶綾羅錦繡錢布香油於道場中説法處所千萬衆前證明功德為己乞懴悔謝罪愆如是等人全得果報猶勝死後留財物與人爾時天尊為説偈曰一念歡身並虛假四大五體本非真三百六十碎骨節皮肉合成膿血身念念無常恆不住朝夕煩惱亂心神父母妻子權相寄兄弟姊妹少時因一朝氣斷空歸去百骸爛壞總成塵縱有男女頭邊哭終難救拔免沉淪各自勤修今日善慎莫留財付後人説此偈巳是諸大衆覺無常苦無處容身為衆生悲涕交切重問天尊夫三界中有得常不天尊告曰不也普慈汝從何來不解此義我昔曽於協晨館委囑斯言三清衆聖念念無常是故世間無可保者善男子五濁躁競世間無常汝今𢟁勤為勸世緣可今衆生得離苦際此時衆內玄一真人因聲歎言善哉天尊為説此偈於當來世俱沐此恩我等今者書寫受持不敢輕慢天尊重告玄一真人汝等大衆往昔劫時我為衆生出現於世説種種法於事將休言歸妙樂有無量天人來聽後説無量衆生來修後善無量羅剎來作後因無量鬼神來霑後福無量男女來修後供無量男女來行後施吾於爾時受與記别何以故最後施者名最後福田是故男女欲求因果於道場中修最後善為最後結緣無復疑惑時真多舍一切大衆人及非人聞此妙義一時洗心證無為果大上洞玄靈寶太玄普慈勸世經
